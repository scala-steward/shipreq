version: 0.2

phases:
  pre_build:
    commands:
      - cd Code
      - export JAVA_OPTS="-Xms512m -Xmx4g -Xss2m"
      - env|sort
  build:
    commands:
      - sbt -DMODE=release test:compile fullOptJS test
    finally:
      - find /root/.ivy2 /root/.sbt -name '*.lock' -type f -exec rm -fv {} +

cache:
  paths:
    - '/root/.ivy2/**/*'
    - '/root/.sbt/**/*'
