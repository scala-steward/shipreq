version: 0.2

phases:
  pre_build:
    commands:
      - cd Code
      - nohup dockerd --host=unix:///var/run/docker.sock --host=tcp://127.0.0.1:2375 --storage-driver=overlay2 &
      - $(aws ecr get-login --no-include-email --region $AWS_REGION)
      - timeout 15 sh -c "until docker info; do sleep .5; done"
      - bin/env test --no-ansi up -d
  build:
    commands:
      - >
        /bin/bash -c '
          set -o pipefail;
          bin/release | strip-ansi
        '
    finally:
      - find /root/.cache/coursier /root/.ivy2 /root/.sbt -name '*.lock' -type f -exec rm -fv {} +
      - bin/env test --no-ansi down

cache:
  paths:
    - '/root/.cache/coursier/**/*'
