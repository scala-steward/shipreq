version: '2'
services:

  postgres:
    image: postgres:9.6.1
    container_name: shipreq_dev_postgres
    ports:
      - "14032:5432"
    environment:
      - POSTGRES_DB=shipreq_dev
      - POSTGRES_USER=dev
      - POSTGRES_PASSWORD=sqd
    logging:
      driver: none
    mem_limit: 600m
    cpuset: "0"

  taskman:
    image: shipreq/taskman
    container_name: shipreq_dev_taskman
    links:
      - postgres
      - logstash
    volumes:
      - ./taskman:/taskman/conf:ro
    environment:
      - db.host=postgres
      - db.database=shipreq_dev
      - db.username=dev
      - db.password=sqd
    mem_limit: 448m
    cpuset: "1,2"

  webapp:
    image: shipreq/webapp
    container_name: shipreq_dev_webapp
    links:
      - postgres
      - logstash
    ports:
      - "14080:8080"
      - "14443:8443"
    volumes:
      - ./webapp:/shipreq/conf:ro
    environment:
      - db.host=postgres
      - db.database=shipreq_dev
      - db.username=dev
      - db.password=sqd
      - run.mode=staging
      - shipreq.url=https://localhost:14443
      - EXTERNAL_PORT_SSL=14443
    mem_limit: 1856m # 2.25*1024 - 448 for Taskman
    cpuset: "1,2"

  prometheus:
    image: prom/prometheus:v2.1.0
    container_name: shipreq_dev_prometheus
    ports:
      - "14100:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    links:
      - cadvisor

  grafana:
    image: grafana/grafana
    container_name: shipreq_dev_grafana
    links:
      - prometheus
    ports:
      - "14101:3000"
    volumes:
      - ./grafana-ds-prometheus.json:/etc/grafana/datasources/prometheus.json

#  node-exporter:
#    image: prom/node-exporter
#    container_name: shipreq_dev_nodeexporter
#    volumes:
#      - /proc:/host/proc:ro
#      - /sys:/host/sys:ro
#      - /:/rootfs:ro
#    command:
#      - '--path.procfs=/host/proc'
#      - '--path.sysfs=/host/sys'
#      - --collector.filesystem.ignored-mount-points
#      - "^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/run/docker/netns|rootfs/var/lib/docker/aufs)($$|/)"
#    ports:
#      - "14102:9100"

  cadvisor:
    image: google/cadvisor
    container_name: shipreq_dev_cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "14103:8080"

  # sudo sysctl -w vm.max_map_count=262144
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch-oss:6.1.2
    container_name: shipreq_dev_elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana-oss:6.1.2
    container_name: shipreq_dev_kibana
    links:
      - elasticsearch
    ports:
      - "14104:5601"
    logging:
      driver: none

  logstash:
    image: docker.elastic.co/logstash/logstash-oss:6.1.2
    container_name: shipreq_dev_logstash
    links:
      - elasticsearch
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "14500:14500"


