# This is what a full Jaeger setup would look like. 1.2.0 only supports ElasticSearch 5 and not 6 though...
jaeger-collector:
	image: jaegertracing/jaeger-collector:1.2.0
	container_name: shipreq_dev_jaeger_collector
	command: ["/go/bin/collector-linux", "--cassandra.servers=cassandra"] # "--cassandra.keyspace=jaeger"
	ports:
		- "14269"
		- "14268:14268"
		- "14267"
		- "9411:9411"
	environment:
		- SPAN_STORAGE_TYPE=cassandra
	depends_on:
		- cassandra
		- jaeger-cassandra-schema

jaeger-query:
	image: jaegertracing/jaeger-query:1.2.0
	container_name: shipreq_dev_jaeger_query
	command: ["/go/bin/query-linux", "--query.static-files=/go/jaeger-ui/", "--cassandra.servers=cassandra"] # "--cassandra.keyspace=jaeger"
	ports:
		- "16686:16686"
		- "16687"
	depends_on:
		- cassandra
		- jaeger-cassandra-schema

cassandra:
	image: cassandra:3.11.1
	container_name: shipreq_dev_cassandra

# How do you configure this piece of shit?
jaeger-cassandra-schema:
	image: jaegertracing/jaeger-cassandra-schema:1.2.0
	container_name: shipreq_dev_cassandra_schema
	depends_on:
		- cassandra

