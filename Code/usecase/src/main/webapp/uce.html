<html>
<head>
<meta content="text/html; charset=UTF-8" http-equiv="content-type">
<link media="screen" type="text/css" href="assets/normalize.css" rel="stylesheet" />
<link media="screen" type="text/css" href="assets/uce.css" rel="stylesheet" />
<script src="http://code.jquery.com/jquery-1.8.2.min.js"></script>
</head>
<body data-lift-content-id="main">
	<div id="main" data-lift="surround?with=default;at=content">
		
		<link data-lift="head" rel="stylesheet" href="/assets/uce.css" type="text/css" />
		<script data-lift="head" src="assets/jquery.autosize.js"></script>
		<script data-lift="tail" type="text/javascript">
			$(document).ready(function() {
				$('textarea').autosize();
			});
		</script>

		<div id="uce" data-lift="UCE2">
			<table class="title">
				<tr>
					<th><span>UC-<span class="ucid">123</span>:
					</span></th>
					<td><input name="title" value="Use Case Title" /></td>
				</tr>
			</table>

			<table class="ucdata">
				<tr id="template-text">
					<th>Actors</th>
					<td><textarea rows="1">Scorer</textarea></td>
				</tr>
				<tr>
					<th>Pre-conditions</th>
					<td><textarea rows="1">1. Game configuration has been entered. This is comprised of:
a. How many players?
b. Who are the players?
c. The player order.</textarea></td>
				</tr>
				<tr>
					<th>Post-conditions</th>
					<td><textarea rows="1">1. The game is finished.</textarea></td>
				</tr>
				<tr id="template-courses-n">
					<th>Normal<br />Course
					</th>
					<td class="steps">
						<!-- ----------------------------------------------------------------------------- -->
						<div class="step" data-lvl="0" id="template-step">
							<div class="label">1.0.</div>
							<div class="ctl">
								<button class="delete">&dash;</button>
								<button class="indentDec">«</button>
								<button class="indentInc">»</button>
								<button class="add">+</button>
							</div>
							<div class="txt">
								<form data-lift="form.ajax" style="display: inline">
									<textarea rows="1" name="text">Score a new game of Scrabble.</textarea>
								</form>
							</div>
							<!-- 
							<div class="add">
								<button>+</button>
								<div></div>
							</div>
							 -->
						</div>
						<!-- ----------------------------------------------------------------------------- -->
						<div class="step" data-lvl="1">
							<div class="label">1.</div>
							<div class="ctl">
								<button class="delete">&dash;</button>
								<button class="indentDec">«</button>
								<button class="indentInc">»</button>
								<button class="add">+</button>
							</div>
							<div class="txt">
								<form data-lift="form.ajax" style="display: inline">
									<textarea rows="1" name="text">System indicates which player’s turn it is.</textarea>
								</form>
							</div>
						</div>
						<!-- ----------------------------------------------------------------------------- -->
						<div class="step" data-lvl="1">
							<div class="label">2.</div>
							<div class="ctl">
								<button class="delete">&dash;</button>
								<button class="indentDec">«</button>
								<button class="indentInc">»</button>
								<button class="add">+</button>
							</div>
							<div class="txt">
								<form data-lift="form.ajax" style="display: inline">
									<textarea rows="1" name="text">Scorer records result of turn; either a score for the turn, or an indication that the user lost/skipped a turn without scoring any points.</textarea>
								</form>
							</div>
						</div>
						<!-- ----------------------------------------------------------------------------- -->
					</td>
				</tr>
				<tr id="template-courses-a">
					<th>Alternative<br />Courses
					</th>
					<td class="steps">
						<div class="step" data-lvl="0">
							<div class="label">1.1.</div>
							<div class="ctl">
								<button class="delete">&dash;</button>
								<button class="indentDec">«</button>
								<button class="indentInc">»</button>
								<button class="add">+</button>
							</div>
							<div class="txt">
								<form data-lift="form.ajax" style="display: inline">
									<textarea rows="1" name="text">A player’s turn is challenged after the score is entered. [1.0.1, 1.0.4]</textarea>
								</form>
							</div>
						</div>
					</td>
				</tr>
				<tr id="template-courses-e">
					<th>Exceptions</th>
					<td class="steps">More steps</td>
				</tr>
				<tr>
					<th>Use Case<br />Relationships
					</th>
					<td><textarea rows="1"></textarea></td>
				</tr>
				<tr>
					<th>Constraints and<br />Business Rules
					</th>
					<td><textarea rows="1"></textarea></td>
				</tr>
				<tr>
					<th>Frequency of<br />Use
					</th>
					<td><textarea rows="1"></textarea></td>
				</tr>
				<tr>
					<th>Special<br />Requirements
					</th>
					<td><textarea rows="1">1. The game is finished.</textarea></td>
				</tr>
				<tr>
					<th>Assumptions</th>
					<td><textarea rows="1">1. The game is finished.</textarea></td>
				</tr>
				<tr>
					<th>Notes and Issues</th>
					<td><textarea rows="1">1. The game is finished.</textarea></td>
				</tr>
			</table>
		</div>
	</div>
</body>
</html>
